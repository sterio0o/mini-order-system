spring:
  mail:
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    host: smtp.gmail.com
    port: 587
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            trust: smtp.gmail.com

  datasource:
    url: jdbc:postgresql://localhost:5435/notificationdb
    username: postgres
    password: root
  kafka:
    bootstrap-servers: localhost:9092
server:
  port: 8083
